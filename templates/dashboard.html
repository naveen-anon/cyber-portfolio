<!DOCTYPE html>
<html>

<head>

<title>Matrix OSINT Dashboard</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<h1>Matrix OSINT Investigation Dashboard</h1>

<div class="card">

<h2>Username Investigation</h2>

<input id="username" placeholder="Enter username">

<button onclick="scan()">Scan</button>

<pre id="username_result"></pre>

</div>


<div class="card">

<h2>Shodan Lookup</h2>

<input id="ip" placeholder="Enter IP">

<button onclick="shodan()">Search</button>

<pre id="shodan_result"></pre>

</div>


<div class="card">

<h2>Domain OSINT</h2>

<input id="domain" placeholder="Enter domain">

<button onclick="domain()">Lookup</button>

<pre id="domain_result"></pre>

</div>


<div class="card">

<h2>AI Investigation Report</h2>

<button onclick="generateReport()">Generate Report</button>

<pre id="report"></pre>

</div>

</div>

<script src="/static/matrix.js"></script>
<script src="/static/dashboard.js"></script>

</body>

</html>
